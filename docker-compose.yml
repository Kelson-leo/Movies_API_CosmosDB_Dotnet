services:
  cosmos-db:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator
    container_name: cosmos-emulator
    restart: always
    mem_limit: 3g
    cpus: 2.0
    ports:
      - "8081:8081"
      - "10251-10254:10251-10254"

  movies-api:
    build: .
    container_name: movies-api
    ports:
      - "5223:8080" # Mapeia a porta da API
    depends_on:
      - cosmos-db
    environment:
      - CosmosDbSettings__Endpoint=https://cosmos-db:8081/
      - CosmosDbSettings__Key=C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw==
      - CosmosDbSettings__DatabaseName=MoviesDatabase